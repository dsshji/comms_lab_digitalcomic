<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div id="fade-overlay" class="fade-overlay"></div>

  <!-- Heading dialog box -->
  <div id="dialogue-puzzle">
    <div class="textbox">A puzzle…? Maybe piecing this together might reveal something</div>
  </div>


  <!-- puzzle piece drop zone -->
  <div class="drop-zone">
  </div>

  <!-- Bottom nav back to panel 4 -->
  <div id="back-panel4" class="back-hint">
    <span class="back-arrow">↓</span>
    <span class="back-text">Go back</span>
  </div>

  <!-- Image reveal -->
  <section class="hero">
    <img src="../panel5/assets/hospital-bed.png" class="final-image">
    <img src="../panel5/assets/heartbeat.gif" class="object" id="monitor">

    <div id="dialogue-hospital">
      <div class="textbox">I couldn't make it</div>
    </div>

    <!-- Bottom nav back to puzzle -->
    <div id="back-puzzle" class="back-hint">
      <span class="back-arrow">↓</span>
      <span class="back-text">Go back</span>
    </div>
  </section>

  <!-- End Panel -->
  <div class="end-section">
    <div id="end-dialogue">
      <div data-aos="fade-up" class="textbox">No-one lives in this house anymore...</div>
    </div>
  </div>


  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/dixonandmoe/rellax@master/rellax.min.js"></script>
  <!-- GSAP library -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
  <script src="../panel5/script.js"></script>
</body>

</html>
