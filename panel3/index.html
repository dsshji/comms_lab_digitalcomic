  <span class="back-arrow-icon">↑</span>
  <span class="back-text">Go back</span>
</div> 


  
<!-- CODE MODAL -->
<div id="code-modal">
  <div class="cm-backdrop" id="cm-backdrop"></div>
  <div class="cm-box">
    <button class="cm-close" id="cm-close">✕</button>
    <div class="cm-title">Enter Access Code</div>
    <div class="cm-subtitle">Six digits to proceed</div>
    <div class="cm-input-row" id="cm-digits">
      <input class="cm-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="0" />
      <input class="cm-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="1" />
      <input class="cm-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="2" />
      <input class="cm-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="3" />
      <input class="cm-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="4" />
      <input class="cm-digit" maxlength="1" type="text" inputmode="numeric" pattern="[0-9]" autocomplete="off" data-i="5" />
    </div>
    <div class="cm-message" id="cm-msg"></div>
    <button class="cm-btn" id="cm-submit">Confirm</button>
  </div>
</div>

<!-- UNLOCK / FADE / NEXT PAGE -->
<div id="unlock-overlay"><div class="unlock-ring"></div></div>
<div id="fade-out"></div>
<div id="next-page">
  <div class="np-title">Access Granted</div>
  <div class="np-sub">The door is open…</div>
</div>

<script src="script.js"></script>
</body>
</html>
